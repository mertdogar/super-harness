packages:
  - 'packages/*'
  - 'examples/*'
  - 'examples/web/*'
  - 'examples/plan-board/*'
  - 'examples/canvas/*'
  - 'docs'
allowBuilds:
  better-sqlite3: true
  esbuild: true
# Published @super-line/server/client/collections-*/transport-* carry
# @super-line/core as a REGULAR dependency — without this override pnpm
# installs multiple core copies and host + library stop sharing one instance
# (contract identity / SuperLineError instanceof skew). Drop once upstream
# makes core a true peerDependency.
overrides:
  '@super-line/core': ^0.11.2
  # canvas-client uses @tanstack/react-db (pins db@0.5.32) alongside the
  # @super-line/tanstack-db adapter (db@0.5.33). Pin one db instance so the
  # collections they exchange share types (same fix as upstream super-line).
  '@tanstack/react-db>@tanstack/db': 0.5.33
# plugin-auth@0.1.0 predates the 0.11 release wave; its client/server peers
# are stale but its runtime only touches symbols that survive 0.11. Drop once
# upstream republishes plugin-auth with widened peers.
peerDependencyRules:
  allowedVersions:
    '@super-line/plugin-auth>@super-line/client': '^0.9.0'
    '@super-line/plugin-auth>@super-line/server': '^0.11.0'
minimumReleaseAge: 0
