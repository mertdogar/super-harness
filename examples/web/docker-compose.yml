name: super-harness-web

# End-to-end multi-node demo of the store-pglite backend. Central Postgres holds
# BOTH Mastra's ground truth (mastra_* — threads/messages/mode) AND super-line's
# tree source (superline_node/superline_thread). Electric streams the tree tables
# into each node's in-memory PGlite replica; Mastra reads/writes central PG
# directly. So any node sees the same threads + streams the same tree.
#
#   docker compose up --build      (needs AI_GATEWAY_API_KEY in the repo-root .env)
#
# Then open http://localhost:5173. Pick the node from the header selectbox
# (node-1/2/3). Drive a conversation on node-1, then flip the selectbox to node-2:
# the client reconnects and the SAME thread re-renders from node-2's replica —
# that round-trip (node-1 → PG → Electric → node-2) IS the store-pglite cross-node
# proof, in one window. Control Center on :8081 taps node-1's inspector (repoint to
# :8802/:8803 from its Settings).

# One image (repo + pnpm install) for every node AND the vite frontend.
x-app: &app
  build:
    context: ../..
    dockerfile: examples/web/Dockerfile
  image: super-harness-web:dev

# A super-line node: identical code, differs only by NODE_NAME + host port.
x-node: &node
  <<: *app
  command: pnpm --filter @super-harness/web-server exec tsx server.ts
  env_file: ../../.env # AI_GATEWAY_API_KEY only — gitignored, never baked into the image
  depends_on:
    postgres: { condition: service_healthy }
    electric: { condition: service_started }
  healthcheck:
    test: ['CMD', 'node', '-e', "require('net').connect(8801,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
    interval: 2s
    timeout: 3s
    retries: 30

x-node-env: &node-env
  SUPER_HARNESS_PORT: '8801' # every node listens on 8801 internally; host port differs
  SUPER_HARNESS_STORAGE: pglite
  PG_URL: postgres://postgres:password@postgres:5432/electric
  ELECTRIC_URL: http://electric:3000/v1/shape
  CHAT_MODEL: anthropic/claude-haiku-4.5

services:
  # Central Postgres — source of truth for both planes. wal_level=logical so Electric can replicate.
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: electric
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    command: [-c, listen_addresses=*, -c, wal_level=logical]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d electric']
      interval: 2s
      timeout: 3s
      retries: 15

  # Electric — streams the superline_* tables out as HTTP shapes to each node's local PGlite replica.
  electric:
    image: electricsql/electric
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/electric?sslmode=disable
      ELECTRIC_INSECURE: 'true'
    depends_on:
      postgres: { condition: service_healthy }

  # node-1 is the schema leader: it creates the shared superline_* tables during
  # boot. node-2/3 wait for it to be healthy before starting, so the three never
  # run CREATE TABLE IF NOT EXISTS concurrently on a cold DB — that race collides
  # on the table's implicit row-type and throws 42710 (store-pglite 0.1.0 swallows
  # 42P07/23505 but not 42710). Once the tables exist, followers' DDL just no-ops.
  node-1:
    <<: *node
    environment:
      <<: *node-env
      NODE_NAME: node-1
    ports: ['8801:8801'] # → node-1 in the selectbox
  node-2:
    <<: *node
    depends_on:
      postgres: { condition: service_healthy }
      electric: { condition: service_started }
      node-1: { condition: service_healthy } # schema created before we boot
    environment:
      <<: *node-env
      NODE_NAME: node-2
    ports: ['8802:8801'] # → node-2 in the selectbox
  node-3:
    <<: *node
    depends_on:
      postgres: { condition: service_healthy }
      electric: { condition: service_started }
      node-1: { condition: service_healthy } # schema created before we boot
    environment:
      <<: *node-env
      NODE_NAME: node-3
    ports: ['8803:8801'] # → node-3 in the selectbox

  # The React SPA (vite dev). VITE_NODE_BASE_PORT turns on the header node
  # selectbox: node N → ws://<host>:<base+N>/super-line (8801/8802/8803). The
  # browser connects straight to a node's host port; the frontend serves no secrets.
  frontend:
    <<: *app
    command: pnpm --filter @super-harness/web-client exec vite --host 0.0.0.0 --port 5173
    environment:
      VITE_NODE_BASE_PORT: '8800'
      VITE_NODE_COUNT: '3'
    ports: ['5173:5173']

  # super-line Control Center — published package, run via npx (no source in this repo).
  # Serves its SPA on :8081; the browser connects it back to node-1's inspector on the host.
  control-center:
    image: node:22-slim
    command: npx -y @super-line/control-center --url ws://localhost:8801/super-line --port 8081 --no-open
    ports: ['8081:8081']
    depends_on:
      node-1: { condition: service_healthy }
